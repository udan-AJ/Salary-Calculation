<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #007bff;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
            color: #007bff;
            font-weight: bold;
            transition: 0.3s;
        }
        .tab.active {
            background: #007bff;
            color: white;
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }
        input {
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        input:focus {
            border-color: #007bff;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            background: #218838;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #e9ecef;
            border-radius: 8px;
            display: none;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .result-row.deduction {
            color: #dc3545;
        }
        .result-row.addition {
            color: #28a745;
        }
        hr {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 15px 0;
        }
        .final-amount {
            font-size: 18px;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Salary Calculator</h2>
    
    <div class="tabs">
        <div class="tab active" id="tab-forward" onclick="setMode('forward')">Find Gross Salary</div>
        <div class="tab" id="tab-backward" onclick="setMode('backward')">Find Basic Salary</div>
    </div>

    <div class="input-grid">
        <div class="form-group full-width" id="group-basic">
            <label>Basic Salary (Rs.)</label>
            <input type="number" id="basic_salary" value="0" min="0">
        </div>
        <div class="form-group full-width" id="group-gross" style="display:none;">
            <label>Target Gross Salary (Rs.)</label>
            <input type="number" id="gross_salary" value="0" min="0">
        </div>

        <div class="form-group">
            <label>Normal OT (Hours)</label>
            <input type="number" id="normal_ot_hours" value="0" min="0">
        </div>
        <div class="form-group">
            <label>Special OT (Hours)</label>
            <input type="number" id="special_ot_hours" value="0" min="0">
        </div>
        <div class="form-group">
            <label>Lieu Leaves (Days)</label>
            <input type="number" id="lieu_leaves" value="0" min="0">
        </div>
        <div class="form-group">
            <label>Fixed Allowance (Rs.)</label>
            <input type="number" id="allowance" value="0" min="0">
        </div>
        <div class="form-group full-width">
            <label>Other Deductions (Rs.)</label>
            <input type="number" id="deductions" value="0" min="0">
        </div>
    </div>

    <button onclick="calculateSalary()">Calculate</button>

    <div class="result-box" id="result_div">
        <h3 style="margin-top: 0; border-bottom: 1px solid #ccc; padding-bottom: 10px;">Calculation Breakdown</h3>
        
        <div class="result-row"><span>Basic Salary:</span> <strong id="res_basic">0.00</strong></div>
        <div class="result-row addition"><span>+ Normal OT Amount:</span> <span id="res_normal_ot">0.00</span></div>
        <div class="result-row addition"><span>+ Special OT Amount:</span> <span id="res_special_ot">0.00</span></div>
        <div class="result-row addition"><span>+ Special Lieu Leaves Amount:</span> <span id="res_lieu">0.00</span></div>
        <div class="result-row addition"><span>+ Fixed Allowance:</span> <span id="res_allowance">0.00</span></div>
        <div class="result-row deduction"><span>- EPF Deduction (8%):</span> <span id="res_epf">0.00</span></div>
        <div class="result-row deduction"><span>- Other Deductions:</span> <span id="res_deductions">0.00</span></div>
        <hr>
        <div class="result-row final-amount">
            <span>GROSS SALARY:</span> <span id="res_gross" style="color: #007bff;">0.00</span>
        </div>
    </div>
</div>

<script>
    let currentMode = 'forward'; // 'forward' or 'backward'

    function setMode(mode) {
        currentMode = mode;
        
        // Update tabs UI
        document.getElementById('tab-forward').classList.remove('active');
        document.getElementById('tab-backward').classList.remove('active');
        document.getElementById('tab-' + mode).classList.add('active');

        // Show/Hide relevant input fields
        if (mode === 'forward') {
            document.getElementById('group-basic').style.display = 'flex';
            document.getElementById('group-gross').style.display = 'none';
        } else {
            document.getElementById('group-basic').style.display = 'none';
            document.getElementById('group-gross').style.display = 'flex';
        }
        
        // Hide result box when switching modes
        document.getElementById('result_div').style.display = 'none';
    }

    function getValue(id) {
        let val = parseFloat(document.getElementById(id).value);
        return isNaN(val) ? 0 : val;
    }

    function formatCurrency(amount) {
        return "Rs. " + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calculateSalary() {
        // Get Inputs
        const normalOtHours = getValue('normal_ot_hours');
        const specialOtHours = getValue('special_ot_hours');
        const lieuLeaves = getValue('lieu_leaves');
        const allowance = getValue('allowance');
        const deductions = getValue('deductions');

        let basicSalary = 0;
        let grossSalary = 0;

        // Formula Multipliers (Constants based on Basic Salary)
        const k_normal_ot = (1.5 * normalOtHours) / 240;
        const k_special_ot = (2 * specialOtHours) / 240;
        const k_lieu = lieuLeaves / 30;

        if (currentMode === 'forward') {
            basicSalary = getValue('basic_salary');
        } else {
            // Backward Calculation Logic (Algebraic derivation)
            grossSalary = getValue('gross_salary');
            
            // Gross = B + (B*k_normal) + (B*k_special) + (B*k_lieu) + Allowance - Deductions - EPF
            // EPF = 0.08 * (B + B*k_special + B*k_lieu)
            // Therefore: Gross - Allowance + Deductions = B * [1 + k_normal + k_special + k_lieu - 0.08 * (1 + k_special + k_lieu)]
            
            const multiplier = 1 + k_normal_ot + k_special_ot + k_lieu - 0.08 * (1 + k_special_ot + k_lieu);
            
            basicSalary = (grossSalary - allowance + deductions) / multiplier;
        }

        // Calculate actual amounts using Basic Salary
        const normalOtAmount = basicSalary * k_normal_ot;
        const specialOtAmount = basicSalary * k_special_ot;
        const lieuAmount = basicSalary * k_lieu;
        
        // EPF Calculation
        const epfBaseAmount = basicSalary + specialOtAmount + lieuAmount;
        const epfDeduction = epfBaseAmount * 0.08;

        // Calculate Gross Salary for 'forward' mode
        if (currentMode === 'forward') {
            grossSalary = basicSalary + normalOtAmount + specialOtAmount + lieuAmount + allowance - deductions - epfDeduction;
        }

        // Update DOM Elements
        document.getElementById('res_basic').innerText = formatCurrency(basicSalary);
        document.getElementById('res_normal_ot').innerText = formatCurrency(normalOtAmount);
        document.getElementById('res_special_ot').innerText = formatCurrency(specialOtAmount);
        document.getElementById('res_lieu').innerText = formatCurrency(lieuAmount);
        document.getElementById('res_allowance').innerText = formatCurrency(allowance);
        document.getElementById('res_deductions').innerText = formatCurrency(deductions);
        document.getElementById('res_epf').innerText = formatCurrency(epfDeduction);
        document.getElementById('res_gross').innerText = formatCurrency(grossSalary);

        // Show Results
        document.getElementById('result_div').style.display = 'block';
    }
</script>

</body>
</html>
